baseURL: https://istaarkk.github.io/
languageCode: fr-fr
title: Istark Cybersecurity Lab
theme: hugo-theme-stack

# Change it to your Disqus shortname before using
disqusShortname: 

# GA Tracking ID
googleAnalytics:

# Theme parameters
params:
    mainSections:
        - posts

    # Site description
    description: Recherches et analyses en cybersécurité avancée
    
    # Site keywords
    keywords:
        - cybersecurity
        - binary exploitation
        - reverse engineering
        - web security
        - low level

    # Date format
    dateFormat:
        published: Jan 02, 2006
        lastUpdated: Jan 02, 2006 15:04 MST

    # Footer text
    footer:
        since: 2024
        customText: Laboratoire de recherche en cybersécurité

    # Site logo
    favicon: /favicon.ico
    
    sidebar:
        emoji: 🛡️
        subtitle: Recherche en cybersécurité
        avatar:
            enabled: true
            local: true
            src: img/avatar.png

    article:
        math: false
        toc: true
        readingTime: true
        license:
            enabled: true
            default: Ce contenu est publié sous licence CC BY-NC-SA 4.0

    comments:
        enabled: false
        
    widgets:
        homepage:
            - type: search
            - type: archives
              params:
                  limit: 5
            - type: categories
              params:
                  limit: 10
            - type: tag-cloud
              params:
                  limit: 10

        page:
            - type: toc

    # Social links
    social:
        - identifier: github
          name: GitHub
          url: https://github.com/istaarkk
          params:
              icon: brand-github
              
        - identifier: twitter
          name: Twitter
          url: https://twitter.com/istaarkk
          params:
              icon: brand-twitter

    # Color scheme
    colorScheme:
        toggle: true
        default: auto

# Menu items
menu:
    main:
        - identifier: home
          name: Accueil
          url: /
          weight: -100
          params:
              icon: home
              
        - identifier: about
          name: À propos
          url: /about
          weight: -90
          params:
              icon: user
              
        - identifier: archives
          name: Archives
          url: /archives
          weight: -70
          params:
              icon: archives
              
        - identifier: search
          name: Recherche
          url: /search
          weight: -60
          params:
              icon: search
              
        - identifier: categories
          name: Catégories
          url: /categories
          weight: -50
          params:
              icon: categories

# Archive configuration
taxonomies:
    category: categories
    tag: tags
    series: series

# Archive pagination
paginate: 10

# Privacy settings
privacy:
    disqus:
        disable: true
    googleAnalytics:
        disable: true
    instagram:
        disable: true
    twitter:
        disable: false
        enableDNT: true
        simple: true
        disableInlineCSS: true
    vimeo:
        disable: true
    youtube:
        disable: true

# GitHub Pages configuration
publishDir: public 