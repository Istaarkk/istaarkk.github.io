baseURL: "https://istaarkk.github.io/"
languageCode: "en-us"
title: "Istark Cybersecurity Notes"
theme: "hugo-theme-stack"
paginate: 5

# Configuration du menu
menu:
    main:
        - identifier: home
          name: Home
          url: /
          weight: 1
        - identifier: about
          name: About
          url: /about
          weight: 2
        - identifier: posts
          name: Notes
          url: /posts
          weight: 3
        - identifier: categories
          name: Categories
          url: /categories
          weight: 4
        - identifier: tags
          name: Tags
          url: /tags
          weight: 5

# Paramètres du thème
params:
    mainSections:
        - posts
    featuredImageField: image
    rssFullContent: true
    
    # Activer KaTeX pour les formules mathématiques
    math:
        enable: true
        use: "katex"
    
    footer:
        since: 2024
        customText: "Istark Cybersecurity"

    dateFormat:
        published: Jan 2, 2006
        lastUpdated: Jan 2, 2006 15:04 MST

    sidebar:
        emoji: 🔒
        subtitle: "Cybersecurity and ethical hacking notes"
        avatar:
            enabled: false 