<svg width="600" height="600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="currentColor" stroke-width="0.5" opacity="0.3"/>
    </pattern>
    
    <pattern id="circles" width="80" height="80" patternUnits="userSpaceOnUse">
      <circle cx="40" cy="40" r="5" fill="none" stroke="currentColor" stroke-width="0.5" opacity="0.3"/>
      <circle cx="40" cy="40" r="10" fill="none" stroke="currentColor" stroke-width="0.5" opacity="0.2"/>
    </pattern>
    
    <pattern id="hexagons" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M30 10 L45 20 L45 40 L30 50 L15 40 L15 20 Z" fill="none" stroke="currentColor" stroke-width="0.5" opacity="0.2"/>
    </pattern>
    
    <pattern id="circuit" width="120" height="120" patternUnits="userSpaceOnUse">
      <line x1="0" y1="20" x2="40" y2="20" stroke="currentColor" stroke-width="0.5" opacity="0.3"/>
      <line x1="60" y1="20" x2="100" y2="20" stroke="currentColor" stroke-width="0.5" opacity="0.3"/>
      <line x1="40" y1="20" x2="40" y2="60" stroke="currentColor" stroke-width="0.5" opacity="0.3"/>
      <line x1="60" y1="20" x2="60" y2="100" stroke="currentColor" stroke-width="0.5" opacity="0.3"/>
      <circle cx="40" cy="20" r="3" fill="currentColor" opacity="0.3"/>
      <circle cx="60" cy="20" r="3" fill="currentColor" opacity="0.3"/>
      <line x1="20" y1="60" x2="40" y2="60" stroke="currentColor" stroke-width="0.5" opacity="0.3"/>
      <line x1="40" y1="60" x2="100" y2="60" stroke="currentColor" stroke-width="0.5" opacity="0.3"/>
      <circle cx="40" cy="60" r="3" fill="currentColor" opacity="0.3"/>
      <line x1="20" y1="60" x2="20" y2="100" stroke="currentColor" stroke-width="0.5" opacity="0.3"/>
      <line x1="80" y1="60" x2="80" y2="100" stroke="currentColor" stroke-width="0.5" opacity="0.3"/>
      <line x1="20" y1="100" x2="80" y2="100" stroke="currentColor" stroke-width="0.5" opacity="0.3"/>
      <circle cx="20" cy="100" r="3" fill="currentColor" opacity="0.3"/>
      <circle cx="60" cy="100" r="3" fill="currentColor" opacity="0.3"/>
      <circle cx="80" cy="100" r="3" fill="currentColor" opacity="0.3"/>
    </pattern>
    
    <pattern id="nodes" width="100" height="100" patternUnits="userSpaceOnUse">
      <circle cx="50" cy="50" r="2" fill="currentColor" opacity="0.4"/>
      <circle cx="0" cy="0" r="2" fill="currentColor" opacity="0.4"/>
      <circle cx="0" cy="100" r="2" fill="currentColor" opacity="0.4"/>
      <circle cx="100" cy="0" r="2" fill="currentColor" opacity="0.4"/>
      <circle cx="100" cy="100" r="2" fill="currentColor" opacity="0.4"/>
      <line x1="50" y1="50" x2="0" y2="0" stroke="currentColor" stroke-width="0.5" opacity="0.15"/>
      <line x1="50" y1="50" x2="100" y2="0" stroke="currentColor" stroke-width="0.5" opacity="0.15"/>
      <line x1="50" y1="50" x2="0" y2="100" stroke="currentColor" stroke-width="0.5" opacity="0.15"/>
      <line x1="50" y1="50" x2="100" y2="100" stroke="currentColor" stroke-width="0.5" opacity="0.15"/>
    </pattern>
  </defs>
  
  <rect width="100%" height="100%" fill="url(#grid)"/>
  <rect width="100%" height="100%" fill="url(#circuit)"/>
  <rect width="100%" height="100%" fill="url(#nodes)"/>
  <rect width="100%" height="100%" fill="url(#hexagons)"/>
  <rect width="100%" height="100%" fill="url(#circles)"/>
</svg>
